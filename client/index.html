<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokedex API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Pokédex <span>API</span></h1>
    <div class="header-pokeball" aria-hidden="true"></div>
    <nav>
      <a href="/">Browse</a>
      <a href="/docs">API Docs</a>
    </nav>
  </header>

  <main>

    <!-- Filter / Browse -->
    <section>
      <h2>Browse Pokemon</h2>
      <form id="filter-form">
        <div class="filter-row">
          <label>
            Name
            <input type="text" id="filter-name" placeholder="e.g. saur" />
          </label>
          <label>
            Limit
            <input type="number" id="filter-limit" min="1" max="151" placeholder="All" />
          </label>
          <button type="submit">Search</button>
          <button type="button" id="filter-clear" class="secondary">Clear</button>
        </div>
        <div class="filter-chips-row">
          <span class="chips-label">Type</span>
          <div id="type-picker" class="chips"></div>
        </div>
        <div class="filter-chips-row">
          <span class="chips-label">Weakness</span>
          <div id="weakness-picker" class="chips"></div>
        </div>
      </form>
      <p id="result-count" class="result-count"></p>
      <div class="results-scroll">
        <div id="results"></div>
      </div>
      <div id="pagination"></div>
    </section>

    <!-- Add Pokemon -->
    <section>
      <h2>Add a Pokemon</h2>
      <form id="add-form">
        <div class="form-grid">
          <label>
            Name *
            <input type="text" id="add-name" required placeholder="Pikachu" />
          </label>
          <label>
            Height
            <input type="text" id="add-height" placeholder="0.40 m" />
          </label>
          <label>
            Weight
            <input type="text" id="add-weight" placeholder="6.0 kg" />
          </label>
          <label>
            Weaknesses
            <input type="text" id="add-weaknesses" placeholder="Ground" />
            <span class="form-hint">Comma-separated</span>
          </label>
          <label>
            Image URL
            <input type="url" id="add-img" placeholder="Or use buttons below" />
          </label>
        </div>
        <div class="filter-chips-row">
          <span class="chips-label">Type(s) *</span>
          <div id="add-type-picker" class="chips"></div>
        </div>
        <div class="img-actions">
          <img id="add-img-preview" class="img-preview" alt="Preview" hidden />
          <button type="button" class="secondary" data-picker-target="add">Choose from Pokedex</button>
          <button type="button" class="secondary" data-upload-target="add">Upload File</button>
          <input type="file" id="add-img-file" accept="image/*" hidden />
        </div>
        <button type="submit">Add Pokemon</button>
        <p id="add-msg" class="msg"></p>
      </form>
    </section>

    <!-- Update Pokemon -->
    <section>
      <h2>Update a Pokemon</h2>
      <form id="update-form">
        <div class="lookup-row">
          <label>
            Pokemon ID *
            <input type="number" id="update-id" required min="1" placeholder="25" />
          </label>
          <button type="button" id="lookup-btn" class="secondary">Look Up</button>
        </div>
        <div id="update-fields" hidden>
          <div class="form-grid">
            <label>
              Name
              <input type="text" id="update-name" />
            </label>
            <label>
              Height
              <input type="text" id="update-height" />
            </label>
            <label>
              Weight
              <input type="text" id="update-weight" />
            </label>
            <label>
              Image URL
              <input type="url" id="update-img" />
            </label>
          </div>
          <div class="filter-chips-row">
            <span class="chips-label">Type(s)</span>
            <div id="update-type-picker" class="chips"></div>
          </div>
        </div>
        <div class="img-actions" id="update-img-actions" hidden>
          <img id="update-img-preview" class="img-preview" alt="Preview" hidden />
          <button type="button" class="secondary" data-picker-target="update">Choose from Pokedex</button>
          <button type="button" class="secondary" data-upload-target="update">Upload File</button>
          <input type="file" id="update-img-file" accept="image/*" hidden />
        </div>
        <button type="submit" id="update-submit" hidden>Save Changes</button>
        <p id="update-msg" class="msg"></p>
      </form>
    </section>

  </main>

  <!-- Pokemon detail modal -->
  <dialog id="pokemon-detail">
    <button type="button" id="detail-close" class="secondary detail-close" aria-label="Close">&#x2715;</button>
    <div id="detail-content"></div>
  </dialog>

  <!-- Image picker modal -->
  <dialog id="img-picker">
    <div class="picker-header">
      <h3>Choose a Pokemon Image</h3>
      <input type="search" id="picker-search" placeholder="Filter by name..." />
      <button type="button" id="picker-close" class="secondary">Close</button>
    </div>
    <div id="picker-grid"></div>
  </dialog>

  <script src="/main.js"></script>
</body>
</html>
